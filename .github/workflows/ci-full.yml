name: CI Full

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake libssl-dev

      - name: Build Boost 1.91.0
        run: |
          BOOST_ROOT=/usr/local/boost_1_91
          wget -q https://archives.boost.io/release/1.91.0/source/boost_1_91_0.tar.gz
          tar xzf boost_1_91_0.tar.gz
          cd boost_1_91_0
          ./bootstrap.sh --prefix=${BOOST_ROOT} --with-libraries=json,url,filesystem
          sudo ./b2 install -j$(nproc) --prefix=${BOOST_ROOT} --with-json --with-url --with-filesystem variant=release link=shared threading=multi
          echo "BOOST_ROOT=${BOOST_ROOT}" >> $GITHUB_ENV
          sudo ldconfig ${BOOST_ROOT}/lib

      - name: Build Google Test
        run: |
          git clone --depth 1 --branch v1.14.0 https://github.com/google/googletest.git
          cd googletest
          cmake -DCMAKE_BUILD_TYPE=Release -B build
          cmake --build build -j$(nproc)
          sudo cp build/lib/libgtest*.a /usr/local/lib/
          sudo cp -r googletest/include/gtest /usr/local/include/
          sudo cp -r googlemock/include/gmock /usr/local/include/

      - name: Build Google Benchmark
        run: |
          git clone --depth 1 --branch v1.8.5 https://github.com/google/benchmark.git
          cd benchmark
          cmake -DCMAKE_BUILD_TYPE=Release -DBENCHMARK_ENABLE_TESTING=OFF -B build
          cmake --build build -j$(nproc)
          sudo cmake --install build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: C++ cmake build (full)
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: C++ unit tests (chat_tests)
        run: |
          cd build
          LD_LIBRARY_PATH=output/lib:${BOOST_ROOT}/lib ./output/test/chat_tests

      - name: module/core standalone test
        run: cd module/core && bash test_build.sh

      - name: module/app standalone test
        run: cd module/app && bash test_build.sh

      - name: module/llm standalone test
        run: cd module/llm && bash test_build.sh

      - name: Frontend npm install
        run: cd desktop && npm ci --ignore-scripts

      - name: Frontend vitest
        run: cd desktop && npx vitest run
